<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HomeMatch - Find Your Perfect Roommate</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <!-- Navigation -->
    <nav id="navbar" class="navbar">
        <div class="navbar-container">
            <div class="logo">
                <span class="logo-icon">🏠</span>
                <span class="logo-text">HomeMatch</span>
            </div>
            <p class="tagline">Find your perfect roommate</p>
        </div>
    </nav>

    <!-- Main Content -->
    <main id="main" class="main-container">
        <!-- Swipe Page -->
        <div id="swipe-page" class="page active">
            <div class="page-header">
                <h2>Swipe Apartments</h2>
                <p id="counter" class="counter">1 of 21</p>
            </div>

            <div class="swipe-container">
                <!-- Image Section -->
                <div class="image-section">
                    <div class="image-wrapper">
                        <img id="main-image" src="" alt="Apartment" class="main-image">
                        <button id="prev-btn" class="nav-btn nav-btn-left">❮</button>
                        <button id="next-btn" class="nav-btn nav-btn-right">❯</button>
                        <div class="image-counter" id="image-counter">1 / 3</div>
                    </div>

                    <!-- Thumbnails -->
                    <div id="thumbnails" class="thumbnails"></div>
                </div>

                <!-- Details Section -->
                <div class="details-section">
                    <div>
                        <h2 id="apt-title" class="apt-title"></h2>
                        <div class="location">
                            <span class="location-icon">📍</span>
                            <span id="apt-location"></span>
                        </div>

                        <!-- Price Box -->
                        <div class="price-box">
                            <div class="price-row">
                                <span class="price" id="apt-price"></span>
                                <span class="size" id="apt-size"></span>
                            </div>
                            <span class="month">/month</span>
                        </div>

                        <!-- Quick Info -->
                        <div class="quick-info">
                            <div class="info-card">
                                <span class="info-icon">🛏️</span>
                                <span class="info-value" id="apt-beds"></span>
                                <p class="info-label">Bedrooms</p>
                            </div>
                            <div class="info-card">
                                <span class="info-icon">🚿</span>
                                <span class="info-value" id="apt-baths"></span>
                                <p class="info-label">Bathrooms</p>
                            </div>
                            <div class="info-card">
                                <span class="info-icon">🛋️</span>
                                <span class="info-value" id="apt-furnished"></span>
                                <p class="info-label">Furnished</p>
                            </div>
                        </div>

                        <!-- Description -->
                        <p id="apt-description" class="description"></p>

                        <!-- Amenities -->
                        <div id="amenities-container" class="amenities-container"></div>
                    </div>

                    <!-- Buttons -->
                    <div class="button-group">
                        <button id="nope-btn" class="btn btn-nope">✕ NOPE</button>
                        <button id="like-btn" class="btn btn-like">❤ LIKE</button>
                    </div>
                </div>
            </div>
        </div>

        <!-- Explore Page -->
        <div id="explore-page" class="page">
            <div class="page-header">
                <h2>Explore Apartments</h2>
            </div>
            <div class="filters">
                <div class="filter-group">
                    <label>Price Range: <span id="price-range">7500 - 18500</span> DKK</label>
                    <input type="range" id="price-filter" min="0" max="30000" value="30000">
                </div>
                <div class="filter-group">
                    <label>Min Size: <span id="size-value">35</span> m²</label>
                    <input type="range" id="size-filter" min="0" max="200" value="35">
                </div>
            </div>
            <div id="apartments-grid" class="apartments-grid"></div>
        </div>

        <!-- Liked Page -->
        <div id="liked-page" class="page">
            <div class="page-header">
                <h2>Liked Apartments</h2>
            </div>
            <div id="liked-list" class="liked-list"></div>
        </div>

        <!-- Chat Page -->
        <div id="chat-page" class="page">
            <div class="page-header">
                <h2>Messages</h2>
            </div>
            <div id="chat-container" class="chat-container"></div>
        </div>

        <!-- Profile Page -->
        <div id="profile-page" class="page">
            <div class="page-header">
                <h2>My Profile</h2>
            </div>
            <div class="profile-container">
                <div class="profile-form">
                    <input type="text" id="name-input" placeholder="Your Name" class="input-field">
                    <input type="number" id="age-input" placeholder="Age" class="input-field">
                    <textarea id="bio-input" placeholder="Tell us about yourself" class="input-field" rows="4"></textarea>
                    <button id="save-profile-btn" class="btn btn-like">Save Profile</button>
                </div>
                <div id="personality-questions" class="personality-questions"></div>
            </div>
        </div>
    </main>

    <!-- Bottom Navigation -->
    <nav class="bottom-nav">
        <button class="nav-item active" data-page="swipe-page">🏠 Swipe</button>
        <button class="nav-item" data-page="explore-page">🔍 Explore</button>
        <button class="nav-item" data-page="liked-page">❤ Liked</button>
        <button class="nav-item" data-page="chat-page">💬 Chat</button>
        <button class="nav-item" data-page="profile-page">👤 Profile</button>
    </nav>

    <script src="data.js"></script>
    <script src="script.js"></script>
</body>
</html>
